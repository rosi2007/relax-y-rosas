<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relax & Rosas</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Quicksand',sans-serif;
background:#0f172a;
color:white;
margin:0;
overflow-x:hidden;
}

/* mandala fondo */

.mandala{
position:fixed;
width:1700px;
height:1700px;
background:url("https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Mandala_2.svg/1024px-Mandala_2.svg.png");
background-size:contain;
background-repeat:no-repeat;
opacity:0.05;
top:50%;
left:50%;
transform:translate(-50%,-50%);
animation:spin 200s linear infinite;
z-index:0;
}

@keyframes spin{
from{transform:translate(-50%,-50%) rotate(0deg);}
to{transform:translate(-50%,-50%) rotate(360deg);}
}

/* hero */

.hero{
height:90vh;
background-image:url("https://images.unsplash.com/photo-1544161515-4ab6ce6db874");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.overlay{
background:rgba(0,0,0,0.55);
position:absolute;
width:100%;
height:100%;
}

.hero-content{
position:relative;
z-index:2;
}

.brand{
font-family:'Playfair Display',serif;
font-size:70px;
color:#f97316;
}

.section{
padding:80px 20px;
max-width:900px;
margin:auto;
position:relative;
z-index:2;
}

.card{
background:white;
color:#111;
padding:40px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

input,select,textarea{
color:#111;
}

</style>

</head>

<body>

<div class="mandala"></div>

<!-- HERO -->

<section class="hero">

<div class="overlay"></div>

<div class="hero-content">

<div class="brand">
Relax & Rosas
</div>

<h2 class="text-3xl mt-4">
Espacio de Bienestar
</h2>

<p class="mt-6 text-xl">
Masajes • Sanación Energética • Relax
</p>

<a href="#reserva" class="bg-orange-500 px-10 py-4 rounded-full text-xl font-bold mt-8 inline-block">
Reservar Turno
</a>

</div>

</section>

<!-- RESERVA -->

<section id="reserva" class="section">

<div class="card">

<h2 class="text-3xl font-bold text-center mb-10">
Reservar Turno
</h2>

<form id="reservaForm" action="https://formspree.io/f/xvzbnpyw" method="POST" class="space-y-6">

<input type="text" name="Nombre" placeholder="Nombre completo" required class="w-full p-4 rounded-lg border">

<input type="tel" name="WhatsApp" placeholder="WhatsApp" required class="w-full p-4 rounded-lg border">

<select name="Servicio" required class="w-full p-4 rounded-lg border">
<option value="">Seleccionar servicio</option>
<option>Masaje Descontracturante</option>
<option>Masaje Linfático Manual</option>
<option>Masaje Relax cuerpo completo</option>
<option>Masaje Piedras Frias/Calientes</option>
<option>Masaje Armonizacion Integral</option>
<option>Masaje Reductor</option>
<option>Pulido Corporal + Hidratacion</option>
<option>Seciones de Reiki presencial</option>
<option>Seciones de Reiki a distancia</option>
</select>

<input type="date" name="Fecha" id="fechaTurno" required class="w-full p-4 rounded-lg border">

<select name="Horario" required class="w-full p-4 rounded-lg border">
<option value="">Seleccionar horario</option>
<option>14:00</option>
<option>16:00</option>
<option>18:00</option>
</select>

<textarea name="Notas" placeholder="Dolencias o comentarios" class="w-full p-4 rounded-lg border"></textarea>

<button type="submit" class="w-full bg-orange-500 text-white py-4 text-xl rounded-full font-bold hover:bg-orange-600">
Confirmar Reserva
</button>

<!-- PAGOS -->

<div class="text-center mt-6">

<p class="text-gray-500 text-sm mb-3">Medios de pago</p>

<div class="flex justify-center gap-4 items-center">

<img src="https://img.icons8.com/color/48/visa.png" width="40">
<img src="https://img.icons8.com/color/48/mastercard.png" width="40">

<a href="https://mpago.la/TU_LINK_PAGO" target="_blank">
<img src="https://img.icons8.com/color/48/mercado-pago.png" width="40">
</a>

</div>

</div>

</form>

</div>

</section>

<script>

/* bloquear fechas pasadas */

const fecha = document.getElementById("fechaTurno")
let hoy = new Date().toISOString().split("T")[0]
fecha.setAttribute("min", hoy)

/* WHATSAPP */

document.getElementById("reservaForm").addEventListener("submit", function(){

let nombre = document.querySelector('input[name="Nombre"]').value
let telefonoCliente = document.querySelector('input[name="WhatsApp"]').value
let servicio = document.querySelector('select[name="Servicio"]').value
let fechaTurno = document.querySelector('input[name="Fecha"]').value
let horario = document.querySelector('select[name="Horario"]').value

let mensaje = `Hola! Nuevo turno:%0A
Nombre: ${nombre}%0A
Tel: ${telefonoCliente}%0A
Servicio: ${servicio}%0A
Fecha: ${fechaTurno}%0A
Horario: ${horario}`

let tuNumero = "5491127992558" // CAMBIAR

window.open(`https://wa.me/${tuNumero}?text=${mensaje}`, "_blank")

})

</script>

</body>
</html>
